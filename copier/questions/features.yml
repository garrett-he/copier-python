---
with_cli:
  type: bool
  help: "With command-line interface?"
  default: False

with_nested_commands:
  type: bool
  help: "With nested commands?"
  default: False
  when: "{{ with_cli }}"

with_nuitka:
  type: bool
  help: "With nuitka?"
  default: False
  when: "{{ with_cli }}"

with_tox:
  type: bool
  help: "With tox?"
  default: True
  when: "{{ with_tox }}"
